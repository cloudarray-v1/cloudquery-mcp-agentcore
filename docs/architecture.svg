<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>CloudQuery MCP — System overview</title>
  <desc>Three zones: developer machines, AgentCore runtime, and AWS data layer</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 13px; font-weight: 600; fill: #26215C; }
      .ts  { font-size: 11px; font-weight: 400; fill: #534AB7; }
      .label { font-size: 11px; font-weight: 400; fill: #5F5E5A; }
      .zone  { font-size: 11px; font-weight: 500; fill: #888780; }
      .arr   { stroke: #888780; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Zone: Developers -->
  <rect x="20" y="20" width="185" height="300" rx="12" fill="#FAFAF9" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="zone" x="112" y="38" text-anchor="middle">Developer machines</text>
  <rect x="36" y="50" width="153" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="112" y="72" text-anchor="middle">Claude Desktop</text>
  <text class="ts" x="112" y="90" text-anchor="middle">mcp-remote + SigV4</text>
  <rect x="36" y="116" width="153" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="112" y="138" text-anchor="middle">Cursor IDE</text>
  <text class="ts" x="112" y="156" text-anchor="middle">mcp-remote + SigV4</text>
  <rect x="36" y="182" width="153" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="112" y="204" text-anchor="middle">VS Code</text>
  <text class="ts" x="112" y="222" text-anchor="middle">mcp-remote + SigV4</text>
  <rect x="36" y="252" width="153" height="52" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="112" y="274" text-anchor="middle" style="fill:#444441">AWS credentials</text>
  <text class="label" x="112" y="292" text-anchor="middle">InvokeAgentRuntime</text>

  <!-- Arrows IDEs → AgentCore -->
  <line x1="205" y1="76" x2="248" y2="124" class="arr" marker-end="url(#arrow)"/>
  <line x1="205" y1="142" x2="248" y2="162" class="arr" marker-end="url(#arrow)"/>
  <line x1="205" y1="208" x2="248" y2="202" class="arr" marker-end="url(#arrow)"/>
  <text class="label" x="223" y="152" text-anchor="middle">HTTPS</text>

  <!-- Zone: AgentCore -->
  <rect x="248" y="20" width="210" height="300" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="zone" x="353" y="38" text-anchor="middle" style="fill:#0F6E56">Bedrock AgentCore · us-east-1</text>
  <rect x="264" y="50" width="178" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="353" y="72" text-anchor="middle" style="fill:#04342C">IAM authorizer</text>
  <text class="ts" x="353" y="90" text-anchor="middle" style="fill:#085041">validates SigV4</text>
  <rect x="264" y="116" width="178" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="353" y="138" text-anchor="middle" style="fill:#04342C">Session router</text>
  <text class="ts" x="353" y="156" text-anchor="middle" style="fill:#085041">Mcp-Session-Id → MicroVM</text>
  <rect x="264" y="182" width="178" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="353" y="204" text-anchor="middle" style="fill:#04342C">MicroVM</text>
  <text class="ts" x="353" y="222" text-anchor="middle" style="fill:#085041">cq-platform-mcp :8080</text>
  <rect x="264" y="252" width="178" height="52" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="353" y="274" text-anchor="middle" style="fill:#444441">ECR</text>
  <text class="label" x="353" y="292" text-anchor="middle">cloudquery-mcp image</text>

  <!-- Arrows AgentCore → AWS -->
  <line x1="458" y1="208" x2="498" y2="166" class="arr" marker-end="url(#arrow)"/>
  <line x1="458" y1="218" x2="498" y2="258" class="arr" marker-end="url(#arrow)"/>
  <text class="label" x="478" y="220" text-anchor="middle">TLS</text>

  <!-- Zone: AWS data -->
  <rect x="498" y="20" width="162" height="300" rx="12" fill="#FAFAF9" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="zone" x="579" y="38" text-anchor="middle">AWS data layer</text>
  <rect x="514" y="50" width="130" height="64" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="th" x="579" y="74" text-anchor="middle" style="fill:#042C53">RDS PostgreSQL</text>
  <text class="ts" x="579" y="92" text-anchor="middle" style="fill:#185FA5">cq_inventory</text>
  <rect x="514" y="130" width="130" height="64" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="579" y="154" text-anchor="middle" style="fill:#412402">Secrets Manager</text>
  <text class="ts" x="579" y="172" text-anchor="middle" style="fill:#854F0B">pg-conn secret</text>
  <rect x="514" y="210" width="130" height="64" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="579" y="234" text-anchor="middle" style="fill:#444441">CloudQuery CLI</text>
  <text class="label" x="579" y="252" text-anchor="middle">syncs AWS assets</text>
  <line x1="579" y1="274" x2="579" y2="290" class="arr" stroke="#888780" marker-end="url(#arrow)"/>
  <line x1="579" y1="194" x2="579" y2="210" class="arr" stroke="#BA7517" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
</svg>
