<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>CloudQuery MCP — deploy.sh steps</title>
  <desc>Five sequential steps run by deploy.sh to provision the full stack</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th    { font-size: 13px; font-weight: 600; fill: #444441; }
      .ts    { font-size: 11px; fill: #5F5E5A; }
      .amber { font-size: 13px; font-weight: 600; fill: #412402; }
      .teal  { font-size: 13px; font-weight: 600; fill: #04342C; }
      .purple{ font-size: 13px; font-weight: 600; fill: #26215C; }
      .sub   { font-size: 11px; fill: #888780; }
    </style>
  </defs>

  <!-- Step 1: ECR -->
  <rect x="20"  y="30" width="100" height="84" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th"  x="70"  y="58"  text-anchor="middle">1 · ECR repo</text>
  <text class="ts"  x="70"  y="76"  text-anchor="middle">create if missing</text>
  <text class="ts"  x="70"  y="92"  text-anchor="middle">scan on push</text>
  <line x1="120" y1="72" x2="144" y2="72" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: Docker -->
  <rect x="144" y="30" width="100" height="84" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th"  x="194" y="58"  text-anchor="middle">2 · Docker</text>
  <text class="ts"  x="194" y="76"  text-anchor="middle">build linux/amd64</text>
  <text class="ts"  x="194" y="92"  text-anchor="middle">push to ECR</text>
  <line x1="244" y1="72" x2="268" y2="72" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: IAM -->
  <rect x="268" y="30" width="112" height="84" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="amber" x="324" y="56"  text-anchor="middle">3 · IAM role</text>
  <text class="ts"    x="324" y="74"  text-anchor="middle" style="fill:#854F0B">trust policy</text>
  <text class="ts"    x="324" y="90"  text-anchor="middle" style="fill:#854F0B">permissions policy</text>
  <text class="ts"    x="324" y="106" text-anchor="middle" style="fill:#854F0B">idempotent</text>
  <line x1="380" y1="72" x2="404" y2="72" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 4: AgentCore Runtime -->
  <rect x="404" y="30" width="112" height="84" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="teal"  x="460" y="54"  text-anchor="middle">4a · Runtime</text>
  <text class="ts"    x="460" y="72"  text-anchor="middle" style="fill:#085041">create-agent-runtime</text>
  <text class="ts"    x="460" y="88"  text-anchor="middle" style="fill:#085041">container config</text>
  <text class="ts"    x="460" y="104" text-anchor="middle" style="fill:#085041">env vars injected</text>
  <line x1="516" y1="72" x2="540" y2="72" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 4b: Endpoint -->
  <rect x="540" y="30" width="120" height="84" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="teal"  x="600" y="54"  text-anchor="middle">4b · Endpoint</text>
  <text class="ts"    x="600" y="72"  text-anchor="middle" style="fill:#085041">create-agent-runtime</text>
  <text class="ts"    x="600" y="88"  text-anchor="middle" style="fill:#085041">-endpoint</text>
  <text class="ts"    x="600" y="104" text-anchor="middle" style="fill:#085041">returns public URL</text>

  <!-- Before box -->
  <rect x="20" y="140" width="308" height="60" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="174" y="161" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:12px; font-weight:600; fill:#444441">Before running</text>
  <text x="174" y="179" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; fill:#888780">export POSTGRES_SECRET_ARN=arn:aws:secretsmanager:...</text>
  <text x="174" y="194" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; fill:#888780">aws · docker · python3 on PATH</text>

  <!-- After box -->
  <rect x="352" y="140" width="308" height="60" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="506" y="161" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:12px; font-weight:600; fill:#444441">After completion</text>
  <text x="506" y="179" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; fill:#888780">MCP endpoint URL printed to terminal</text>
  <text x="506" y="194" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; fill:#888780">developer-configs/ written with real URL</text>

  <!-- Developer step pills -->
  <rect x="20"  y="224" width="194" height="36" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="117" y="246" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:12px; font-weight:600; fill:#04342C">npm install -g mcp-remote</text>

  <rect x="234" y="224" width="212" height="36" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="246" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:12px; font-weight:600; fill:#26215C">copy config from developer-configs/</text>

  <rect x="466" y="224" width="194" height="36" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="563" y="246" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:12px; font-weight:600; fill:#444441">connect IDE → done</text>

  <text x="340" y="290" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; fill:#888780">Developer one-time setup (after deploy.sh completes)</text>
</svg>
