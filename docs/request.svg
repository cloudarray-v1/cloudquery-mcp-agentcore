<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>CloudQuery MCP — Request lifecycle</title>
  <desc>Full round-trip from developer tool call through AgentCore to RDS and back</desc>
  <defs>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th   { font-size: 12px; font-weight: 600; }
      .ts   { font-size: 11px; font-weight: 400; fill: #5F5E5A; }
      .note { font-size: 10px; fill: #888780; }
    </style>
  </defs>

  <!-- Column headers -->
  <rect x="20"  y="20" width="108" height="36" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="74"  y="42" text-anchor="middle" style="fill:#26215C">IDE</text>

  <rect x="148" y="20" width="108" height="36" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="202" y="42" text-anchor="middle" style="fill:#26215C">mcp-remote</text>

  <rect x="276" y="20" width="108" height="36" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="th" x="330" y="42" text-anchor="middle" style="fill:#04342C">AgentCore</text>

  <rect x="404" y="20" width="108" height="36" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="th" x="458" y="42" text-anchor="middle" style="fill:#04342C">MicroVM</text>

  <rect x="532" y="20" width="128" height="36" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="th" x="596" y="42" text-anchor="middle" style="fill:#042C53">RDS PostgreSQL</text>

  <!-- Column guide lines -->
  <line x1="74"  y1="56" x2="74"  y2="290" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="202" y1="56" x2="202" y2="290" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="330" y1="56" x2="330" y2="290" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="458" y1="56" x2="458" y2="290" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="596" y1="56" x2="596" y2="290" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 4"/>

  <!-- Request flow (top) -->
  <rect x="24"  y="76" width="100" height="28" rx="6" fill="#F4F3FE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts" x="74"  y="94" text-anchor="middle">call tool</text>
  <line x1="124" y1="90" x2="146" y2="90" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>

  <rect x="152" y="76" width="100" height="28" rx="6" fill="#F4F3FE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts" x="202" y="94" text-anchor="middle">sign SigV4</text>
  <line x1="252" y1="90" x2="274" y2="90" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arr-gray)"/>
  <text class="note" x="263" y="82" text-anchor="middle">HTTPS</text>

  <rect x="280" y="76" width="100" height="28" rx="6" fill="#D5F5EB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="ts" x="330" y="94" text-anchor="middle" style="fill:#085041">IAM check</text>
  <line x1="380" y1="90" x2="402" y2="90" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arr-teal)"/>

  <rect x="408" y="76" width="100" height="28" rx="6" fill="#D5F5EB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="ts" x="458" y="94" text-anchor="middle" style="fill:#085041">POST /mcp</text>
  <line x1="508" y1="90" x2="530" y2="90" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arr-teal)"/>

  <rect x="536" y="76" width="120" height="28" rx="6" fill="#D6E9F8" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="ts" x="596" y="94" text-anchor="middle" style="fill:#042C53">execute SQL</text>

  <!-- SQL return -->
  <line x1="596" y1="104" x2="596" y2="136" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="536" y="136" width="120" height="28" rx="6" fill="#D6E9F8" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="ts" x="596" y="154" text-anchor="middle" style="fill:#042C53">result rows</text>

  <!-- Response flow (bottom) -->
  <line x1="536" y1="150" x2="510" y2="150" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-teal)"/>
  <rect x="408" y="136" width="100" height="28" rx="6" fill="#D5F5EB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="ts" x="458" y="154" text-anchor="middle" style="fill:#085041">format MCP</text>

  <line x1="408" y1="150" x2="382" y2="150" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-teal)"/>
  <rect x="280" y="136" width="100" height="28" rx="6" fill="#D5F5EB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="ts" x="330" y="154" text-anchor="middle" style="fill:#085041">HTTP 200</text>

  <line x1="280" y1="150" x2="254" y2="150" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-gray)"/>
  <rect x="152" y="136" width="100" height="28" rx="6" fill="#F4F3FE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts" x="202" y="154" text-anchor="middle">unwrap</text>

  <line x1="152" y1="150" x2="126" y2="150" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-purple)"/>
  <rect x="24"  y="136" width="100" height="28" rx="6" fill="#F4F3FE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts" x="74"  y="154" text-anchor="middle">tool result</text>

  <!-- Session note -->
  <rect x="276" y="192" width="260" height="40" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="406" y="209" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:12px; font-weight:600; fill:#444441">Session stickiness</text>
  <text x="406" y="225" text-anchor="middle" style="font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; fill:#888780">Mcp-Session-Id routes to same MicroVM</text>

  <!-- Legend -->
  <line x1="24"  y1="266" x2="70"  y2="266" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arr-gray)"/>
  <text class="note" x="78" y="270">request</text>
  <line x1="24"  y1="286" x2="70"  y2="286" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-gray)"/>
  <text class="note" x="78" y="290">response</text>
  <line x1="160" y1="266" x2="206" y2="266" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <text class="note" x="214" y="270">SQL over TLS</text>
  <line x1="160" y1="286" x2="206" y2="286" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <text class="note" x="214" y="290">IDE ↔ mcp-remote</text>
</svg>
